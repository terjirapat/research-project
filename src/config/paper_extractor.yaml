section_aliases:
  abstract:
    - abstract
    - summary
  
  introduction:
    - introduction
    - background
  
  related_work:
    - related work
    - literature review
    - previous work
  
  methodology:
    - method
    - methodology
  
  # experiments:
  #   - experiment
  #   - experimental setup
  #   - evaluation setup
  
  result:
    - result
    - experimental results
    - evaluation
    - finding
  
  discussion:
    - discussion
    - analysis
  
  limitation:
    - limitation
  
  conclusion:
    - conclusion
    - summary and conclusion
  
  # future_work:
  #   - future work
  #   - future directions
  
  # references:
  #   - references
  #   - bibliography
  
  # appendix:
  #   - appendix
  #   - supplementary material

input_path: ../data/paper
output_path: ../data/paper_extracted

llm_model: us.amazon.nova-micro-v1:0

target_sections:
  - abstract
  - introduction
  - methodology
  - result
  - discussion
  - limitation
  - conclusion